services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./engine/master_v2.db:/app/engine/master_v2.db
      - ./engine/agency_crm.xlsx:/app/engine/agency_crm.xlsx
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - DATABASE_URL=postgresql://meridian:meridian@db:5432/meridian
    depends_on:
      - db

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: meridian
      POSTGRES_PASSWORD: meridian
      POSTGRES_DB: meridian
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  postgres_data: